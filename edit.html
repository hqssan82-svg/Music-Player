<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Song</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-edit-div">
        <div id="go-back-div">
            <button id="go-back-button">Go Back</button>
        </div>
        <div id="properties-div">
            <input type="text" id="edit-name-input" class="admin-inputs"  placeholder="Edit Name">
            <input type="text" id="edit-url-input" class="admin-inputs"   placeholder="Edit Url">
            <input type="text" id="edit-image-input" class="admin-inputs" placeholder="Edit Image">

            <button id="edit-confirm-button" class="admin-buttons">Confirm</button>
        </div>
    </div>
    <script src="index.js" type="module"></script>
</body>
</html>
