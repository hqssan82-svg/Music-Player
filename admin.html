<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player -Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="topbar-container"></div>
    <div id="main-admin-div">
        <div id="top-div">
            <div id="register-div">
                <h1 id="add-a-song">Add a Song</h1>
                <div id="admin-name-div">
                    <input type="text" id="admin-name-input" class="admin-inputs" placeholder="Song Name">
                </div>
                <div id="admin-url-div">
                    <input type="text" id="admin-url-input" class="admin-inputs" placeholder="Song Url">
                </div>
                <div id="admin-image-div">
                    <input type="text" id="admin-image-input" class="admin-inputs" placeholder="Song Image (Optional)">
                </div>
                <button id="admin-confirm-button" class="admin-buttons">Confirm</button>
            </div>
        <div id="edit-div">
            <div id="admin-search">
                <input type="text" placeholder="search for songs" id="admin-search-input">
                <button id="admin-search-button">Enter</button>
            </div>
            <div id="edit-songs-div">
            </div>
            <div id="password-div"></div>
        </div>
        </div>
        <div id="admin-bottom-div">
        </div>
    </div>
    <script src="index.js" type="module"></script>
</body>
</html>
